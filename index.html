<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema RPAS + Clima</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }
header { background:#dc2626; padding:15px; text-align:center; }

.container {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  padding:20px;
}

.panel {
  background:#1e293b;
  padding:15px;
  border-radius:10px;
}

input,select,textarea,button {
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:5px;
}

button { background:#dc2626; color:white; }

#mapa { height:300px; }

.card {
  background:#0f172a;
  padding:10px;
  margin-top:10px;
  border-radius:5px;
}
</style>
</head>

<body>

<header>🚁 SISTEMA RPAS + METEOROLOGÍA</header>

<div class="container">

<div class="panel">
<h3>Clima en Tiempo Real</h3>
<div id="clima">Cargando...</div>
<button onclick="obtenerClima()">Actualizar</button>

<h3>Registrar Misión</h3>

<input id="lugar" placeholder="Lugar">
<input id="fecha" type="date">

<select id="tipo">
<option>Incendio estructural</option>
<option>Incendio forestal</option>
<option>Búsqueda y rescate</option>
<option>Inspección</option>
</select>

<input id="piloto" placeholder="Piloto">
<input id="horas" placeholder="Horas de vuelo">

<textarea id="descripcion" placeholder="Descripción"></textarea>

<input type="file" id="fotos" multiple>

<button onclick="guardarMision()">Guardar</button>

</div>

<div class="panel">
<h3>Mapa</h3>
<div id="mapa"></div>
<button onclick="borrarUbicacion()">Borrar ubicación</button>
</div>

</div>

<div class="container">
<div class="panel" style="grid-column:span 2;">
<h3>Histórico</h3>
<input id="buscar" placeholder="Buscar..." onkeyup="mostrar()">
<div id="lista"></div>
</div>
</div>

<script>

const apiKey = "TU_API_KEY";
const appKey = "TU_APPLICATION_KEY";

let climaActual = {};

async function obtenerClima(){

const url = `https://api.ambientweather.net/v1/devices?apiKey=${apiKey}&applicationKey=${appKey}`;

const res = await fetch(url);
const data = await res.json();

const c = data[0].lastData;

climaActual = {
  temp: c.tempf,
  humedad: c.humidity,
  viento: c.windspeedmph
};

document.getElementById("clima").innerHTML = `
🌡️ Temp: ${c.tempf}°F <br>
💧 Humedad: ${c.humidity}% <br>
🌬️ Viento: ${c.windspeedmph} mph
`;

}

setInterval(obtenerClima,60000);
obtenerClima();

let lat=null,lng=null,marcador=null;

let mapa=L.map('mapa').setView([-0.25,-79.17],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa);

mapa.on('click',e=>{
lat=e.latlng.lat;
lng=e.latlng.lng;

if(marcador){ mapa.removeLayer(marcador); }

marcador=L.marker([lat,lng]).addTo(mapa);
});

function borrarUbicacion(){
if(marcador){
mapa.removeLayer(marcador);
marcador=null;
lat=null;
lng=null;
}
}

function generarCodigo(){
return "RPAS-"+Date.now();
}

function guardarMision(){

let archivos=document.getElementById("fotos").files;
let fotos=[];

if(archivos.length>0){

let contador=0;

for(let i=0;i<archivos.length && i<4;i++){

let reader=new FileReader();

reader.onload=e=>{
fotos.push(e.target.result);
contador++;

if(contador===Math.min(archivos.length,4)){
guardarFinal(fotos);
}
};

reader.readAsDataURL(archivos[i]);
}

}else{
guardarFinal([]);
}

}

function guardarFinal(fotos){

let mision={
codigo:generarCodigo(),
lugar:lugar.value,
fecha:fecha.value,
tipo:tipo.value,
piloto:piloto.value,
horas:horas.value,
descripcion:descripcion.value,
lat,lng,fotos,
clima:climaActual
};

let datos=JSON.parse(localStorage.getItem("misiones"))||[];
datos.push(mision);

localStorage.setItem("misiones",JSON.stringify(datos));

alert("Guardado con clima incluido");

mostrar();
}

function mostrar(){

let texto=buscar.value.toLowerCase();

let lista=document.getElementById("lista");
lista.innerHTML="";

let datos=JSON.parse(localStorage.getItem("misiones"))||[];

datos.forEach(m=>{

if(m.lugar.toLowerCase().includes(texto)){

lista.innerHTML+=`
<div class="card">
<b>${m.codigo}</b><br>
📍 ${m.lugar}<br>
🔥 ${m.tipo}<br>
🌡️ ${m.clima?.temp || "-"}°F<br>
🌬️ ${m.clima?.viento || "-"} mph
</div>
`;
}

});

}

mostrar();

</script>

</body>
</html>
