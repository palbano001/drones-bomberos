<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema RPAS PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }
header { background:#dc2626; padding:15px; text-align:center; font-weight:bold; }

.container {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  padding:20px;
}

.panel {
  background:#1e293b;
  padding:15px;
  border-radius:10px;
}

input,select,textarea,button {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:5px;
  border:none;
}

button { background:#dc2626; color:white; cursor:pointer; }

#mapa { height:300px; }

.card {
  background:#0f172a;
  padding:10px;
  margin-top:10px;
  border-radius:5px;
}

img { width:60px; margin:2px; }
</style>
</head>

<body>

<header>🚁 SISTEMA RPAS + INFORME TÉCNICO</header>

<div class="container">

<div class="panel">

<h3>Clima</h3>
<div id="clima">Cargando...</div>
<button onclick="obtenerClima()">Actualizar clima</button>

<h3>Registrar Misión</h3>

<input id="lugar" placeholder="Lugar">
<input id="fecha" type="date">

<select id="tipo">
<option>Incendio estructural</option>
<option>Incendio forestal</option>
<option>Búsqueda y rescate</option>
<option>Inspección</option>
</select>

<input id="piloto" placeholder="Piloto">
<input id="horas" placeholder="Horas de vuelo">
<textarea id="descripcion" placeholder="Descripción"></textarea>

<input type="file" id="fotos" multiple>

<button onclick="guardarMision()">Guardar</button>

</div>

<div class="panel">
<h3>Mapa</h3>
<div id="mapa"></div>
<button onclick="borrarUbicacion()">Borrar ubicación</button>
</div>

</div>

<div class="container">
<div class="panel" style="grid-column:span 2;">
<h3>Histórico</h3>
<input id="buscar" placeholder="Buscar..." onkeyup="mostrar()">
<div id="lista"></div>
</div>
</div>

<script>

// 🔑 CONFIGURA AQUÍ
const apiKey = "TU_API_KEY";
const appKey = "TU_APPLICATION_KEY";

let climaActual = {};

async function obtenerClima(){
try{
const res = await fetch(`https://api.ambientweather.net/v1/devices?apiKey=${apiKey}&applicationKey=${appKey}`);
const data = await res.json();
const c = data[0].lastData;

climaActual = {
temp: c.tempf,
humedad: c.humidity,
viento: c.windspeedmph
};

document.getElementById("clima").innerHTML =
`🌡️ ${c.tempf}°F | 💧 ${c.humidity}% | 🌬️ ${c.windspeedmph} mph`;

}catch{
document.getElementById("clima").innerText="Error clima";
}
}

obtenerClima();

let lat=null,lng=null,marcador=null;

let mapa=L.map('mapa').setView([-0.25,-79.17],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa);

mapa.on('click',e=>{
lat=e.latlng.lat;
lng=e.latlng.lng;

if(marcador) mapa.removeLayer(marcador);
marcador=L.marker([lat,lng]).addTo(mapa);
});

function borrarUbicacion(){
if(marcador){
mapa.removeLayer(marcador);
lat=null; lng=null;
}
}

function generarCodigo(){
return "RPAS-"+Date.now();
}

function guardarMision(){

let archivos=document.getElementById("fotos").files;
let fotos=[];

if(archivos.length>0){
let contador=0;

for(let i=0;i<archivos.length && i<4;i++){
let reader=new FileReader();

reader.onload=e=>{
fotos.push(e.target.result);
contador++;

if(contador===Math.min(archivos.length,4)){
guardarFinal(fotos);
}
};

reader.readAsDataURL(archivos[i]);
}
}else{
guardarFinal([]);
}

}

function guardarFinal(fotos){

let mision={
codigo:generarCodigo(),
lugar:lugar.value,
fecha:fecha.value,
tipo:tipo.value,
piloto:piloto.value,
horas:horas.value,
descripcion:descripcion.value,
lat,lng,fotos,
clima:climaActual
};

let datos=JSON.parse(localStorage.getItem("misiones"))||[];
datos.push(mision);

localStorage.setItem("misiones",JSON.stringify(datos));

alert("Guardado");

mostrar();
}

function mostrar(){

let texto=buscar.value.toLowerCase();
let lista=document.getElementById("lista");
lista.innerHTML="";

let datos=JSON.parse(localStorage.getItem("misiones"))||[];

datos.forEach(m=>{
if(m.lugar.toLowerCase().includes(texto)){

let imgs=(m.fotos||[]).map(f=>`<img src="${f}">`).join("");

lista.innerHTML+=`
<div class="card">
<b>${m.codigo}</b><br>
📍 ${m.lugar}<br>
🔥 ${m.tipo}<br>
🌡️ ${m.clima?.temp || "-"}°F<br>
${imgs}
<br>
<button onclick='generarPDF(${JSON.stringify(m)})'>📄 Descargar PDF</button>
</div>`;
}
});
}

// 🔥 PDF PRO
function generarPDF(m){

const { jsPDF } = window.jspdf;
let doc = new jsPDF();

doc.setFontSize(16);
doc.text("INFORME TÉCNICO RPAS", 20, 20);

doc.setFontSize(10);

doc.text("Código: " + m.codigo, 20, 30);
doc.text("Lugar: " + m.lugar, 20, 40);
doc.text("Fecha: " + m.fecha, 20, 50);
doc.text("Tipo: " + m.tipo, 20, 60);
doc.text("Piloto: " + m.piloto, 20, 70);
doc.text("Horas de vuelo: " + m.horas, 20, 80);

doc.text("Descripción:", 20, 95);
doc.text(m.descripcion, 20, 105);

doc.text("Clima:", 20, 120);
doc.text(`Temp: ${m.clima?.temp}°F`, 20, 130);
doc.text(`Humedad: ${m.clima?.humedad}%`, 20, 140);
doc.text(`Viento: ${m.clima?.viento} mph`, 20, 150);

doc.text("Coordenadas:", 20, 165);
doc.text(`Lat: ${m.lat} Lng: ${m.lng}`, 20, 175);

// 📸 insertar imágenes
let y=190;

(m.fotos||[]).forEach(f=>{
doc.addImage(f, 'JPEG', 20, y, 50, 40);
y+=45;
});

doc.save(m.codigo + ".pdf");
}

mostrar();

</script>

</body>
</html>
