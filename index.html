<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Operaciones con Drones</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 0;
    }

    header {
      background: #dc2626;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    input, textarea, button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 5px;
      border: none;
    }

    button {
      background: #dc2626;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #b91c1c;
    }

    .card {
      background: #1e293b;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<header>
🚁 Sistema de Gestión de Operaciones con Drones – Bomberos
</header>

<div class="container">

  <h2>Registrar Misión</h2>

  <input type="text" id="lugar" placeholder="Lugar del incidente">
  <input type="date" id="fecha">
  <input type="text" id="tipo" placeholder="Tipo de emergencia">
  <input type="text" id="piloto" placeholder="Nombre del piloto">
  <textarea id="descripcion" placeholder="Observaciones"></textarea>

  <button onclick="guardarMision()">Guardar Misión</button>

  <h2>Misiones Registradas</h2>
  <div id="listaMisiones"></div>

</div>

<script>
function guardarMision() {
  const lugar = document.getElementById("lugar").value;
  const fecha = document.getElementById("fecha").value;
  const tipo = document.getElementById("tipo").value;
  const piloto = document.getElementById("piloto").value;
  const descripcion = document.getElementById("descripcion").value;

  const mision = {
    lugar,
    fecha,
    tipo,
    piloto,
    descripcion
  };

  let misiones = JSON.parse(localStorage.getItem("misiones")) || [];
  misiones.push(mision);

  localStorage.setItem("misiones", JSON.stringify(misiones));

  alert("✅ Misión guardada correctamente");

  mostrarMisiones();
}

function mostrarMisiones() {
  const lista = document.getElementById("listaMisiones");
  lista.innerHTML = "";

  let misiones = JSON.parse(localStorage.getItem("misiones")) || [];

  misiones.forEach((m, index) => {
    lista.innerHTML += `
      <div class="card">
        <strong>📍 Lugar:</strong> ${m.lugar} <br>
        <strong>📅 Fecha:</strong> ${m.fecha} <br>
        <strong>🔥 Tipo:</strong> ${m.tipo} <br>
        <strong>👨‍🚒 Piloto:</strong> ${m.piloto} <br>
        <strong>📝 Observación:</strong> ${m.descripcion}
      </div>
    `;
  });
}

// Cargar misiones al iniciar
mostrarMisiones();
</script>

</body>
</html>
