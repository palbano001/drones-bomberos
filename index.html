<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema de Operaciones con Drones</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

header {
  background: #dc2626;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}

.container {
  padding: 20px;
}

input, textarea, button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 5px;
  border: none;
}

button {
  background: #dc2626;
  color: white;
  cursor: pointer;
}

.card {
  background: #1e293b;
  padding: 10px;
  margin-top: 10px;
  border-radius: 5px;
}
</style>
</head>

<body>

<header>
🚁 Sistema de Gestión de Operaciones con Drones – Bomberos
</header>

<div class="container">

<h2>Registrar Misión</h2>

<input type="text" id="lugar" placeholder="Lugar">
<input type="date" id="fecha">
<input type="text" id="tipo" placeholder="Tipo de emergencia">
<input type="text" id="piloto" placeholder="Piloto">
<textarea id="descripcion" placeholder="Observaciones"></textarea>

<button onclick="guardarMision()">Guardar</button>

<h2>Mapa</h2>
<div id="mapa" style="height:300px;"></div>

<h2>Misiones</h2>
<div id="lista"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let mapa = L.map('mapa').setView([-0.25, -79.17], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa);

function guardarMision() {
  const lugar = document.getElementById("lugar").value;
  const fecha = document.getElementById("fecha").value;
  const tipo = document.getElementById("tipo").value;
  const piloto = document.getElementById("piloto").value;
  const descripcion = document.getElementById("descripcion").value;

  navigator.geolocation.getCurrentPosition(function(pos) {

    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    const mision = { lugar, fecha, tipo, piloto, descripcion, lat, lng };

    let misiones = JSON.parse(localStorage.getItem("misiones")) || [];
    misiones.push(mision);

    localStorage.setItem("misiones", JSON.stringify(misiones));

    L.marker([lat, lng]).addTo(mapa).bindPopup(lugar);

    mostrarMisiones();

    alert("Guardado");
  });
}

function mostrarMisiones() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  let misiones = JSON.parse(localStorage.getItem("misiones")) || [];

  misiones.forEach(m => {

    lista.innerHTML += `
      <div class="card">
        <b>${m.lugar}</b><br>
        ${m.fecha}<br>
        ${m.tipo}<br>
        ${m.piloto}<br>
        ${m.descripcion}
      </div>
    `;

    if(m.lat && m.lng){
      L.marker([m.lat, m.lng]).addTo(mapa).bindPopup(m.lugar);
    }

  });
}

mostrarMisiones();
</script>

</body>
</html>
